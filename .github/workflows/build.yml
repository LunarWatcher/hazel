name: Test workflow
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build-ubuntu:
    strategy:
      fail-fast: false
      matrix:
        os-config: 
          - os: ubuntu-latest
            variant: Debug
            image: ubuntu:rolling
          - os: ubuntu-latest
            variant: Release
            image: ubuntu:rolling
    runs-on: ${{ matrix.os-config.os }}
    container: ${{ matrix.os-config.image }}
    steps:
      - name: Install deps
        run: |
          apt update
          apt install -y libssl-dev gcc g++ make \
            build-essential cmake git python3 python3-pip lcov uuid-dev
          # Required for Conan
          pip3 install --break-system-packages conan
      - uses: actions/checkout@v6
      # Necessary because ubuntu:rolling is root
      - name: Fix git ownership
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.os-config.variant }} -DHAZEL_ENABLE_CONAN=ON
          make -j $(nproc)
      - name: Test
        run: |
          cd build
          make -j $(nproc) test
  lint-ubuntu:
    strategy:
      fail-fast: false
      matrix:
        os-config: 
          - os: ubuntu-latest
            variant: Debug
            image: ubuntu:rolling
          - os: ubuntu-latest
            variant: Release
            image: ubuntu:rolling
    runs-on: ${{ matrix.os-config.os }}
    container: ${{ matrix.os-config.image }}
    steps:
      - name: Install deps
        run: |
          apt update
          apt install -y libssl-dev gcc g++ make \
            build-essential cmake git python3 python3-pip lcov uuid-dev clang-tidy
          # Required for Conan
          pip3 install --break-system-packages conan
      - uses: actions/checkout@v6
      # Necessary because ubuntu:rolling is root
      - name: Fix git ownership
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.os-config.variant }} -DLINT=ON -DLINT_WARNINGS_ARE_ERRORS=ON -DHAZEL_ENABLE_CONAN=ON
          make -j $(nproc)
